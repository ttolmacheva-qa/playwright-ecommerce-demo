name: Playwright E2E Tests

# Триггеры запуска пайплайна
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Можно запускать вручную из интерфейса GitHub
  workflow_dispatch: 

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    # 1. Получаем код из репозитория
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Устанавливаем Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # Кэшируем зависимости для ускорения сборки

    # 3. Устанавливаем зависимости проекта
    - name: Install dependencies
      run: npm ci

    # 4. Устанавливаем браузеры Playwright
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # 5. Запускаем тесты
    - name: Run Playwright tests
      run: npx playwright test

    # 6. Сохраняем отчет (HTML report, трейсы, скриншоты)
    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always() # Выполнять шаг даже если тесты упали
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14 # Храним артефакты 2 недели